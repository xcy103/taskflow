# Local dev stack: MongoDB + API + client.
# Usage: cp .env.example .env  &&  docker compose up --build
#   client → http://localhost:5173   api → http://localhost:5001

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    env_file: .env
    ports:
      - "5001:5001"
    depends_on:
      mongo:
        condition: service_healthy # wait until Mongo can accept connections

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mongo-data:
