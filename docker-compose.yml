# Local dev stack: MongoDB + API + client.
# Usage: cp .env.example .env  &&  docker compose up
# (Dockerfiles are added in Phase 5; until then, `mongo` alone is useful:
#  docker compose up mongo)

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build: ./server
    restart: unless-stopped
    env_file: .env
    environment:
      MONGODB_URI: ${MONGODB_URI}
    ports:
      - "5001:5001"
    depends_on:
      - mongo

  client:
    build: ./client
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mongo-data:
