# Builds the API image, pushes it to ACR, and rolls the Container App to it,
# on every push to main that touches the server.
name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  RG: taskflow-rg
  ACR: taskflowacr3319
  APP: taskflow-api

jobs:
  deploy:
    name: Build & deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr login -n "$ACR"
          IMAGE="$ACR.azurecr.io/taskflow-api:${{ github.sha }}"
          # GitHub runners are amd64, matching Container Apps — no cross-build needed.
          docker build -t "$IMAGE" -t "$ACR.azurecr.io/taskflow-api:latest" ./server
          docker push "$IMAGE"
          docker push "$ACR.azurecr.io/taskflow-api:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Update Container App
        run: az containerapp update -n "$APP" -g "$RG" --image "$IMAGE"
